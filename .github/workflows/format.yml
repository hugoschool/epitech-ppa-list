name: "Format"

on:
  push:
    paths:
      - "**.py"
      - ".github/workflows/format.yml"
  pull_request:
    types: ["opened", "synchronize", "reopened"]
    paths:
      - "**.py"
      - ".github/workflows/format.yml"
  workflow_dispatch:

jobs:
  ruff_format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/ruff-action@v3

      - run: ruff format --check
